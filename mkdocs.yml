site_name: OODA
site_description: 'Routes any decision or action through John Boyd real OODA loop — Observe, Orient (the schwerpunkt), Decide, Act, loop fast.'
site_url: https://88plug.github.io/ooda/
repo_url: https://github.com/88plug/ooda
repo_name: 88plug/ooda
edit_uri: edit/main/docs/
use_directory_urls: true
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - navigation.instant
    - content.code.copy
    - search.suggest
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle: {icon: material/weather-night, name: Switch to dark mode}
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle: {icon: material/weather-sunny, name: Switch to light mode}
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - toc:
      permalink: true
